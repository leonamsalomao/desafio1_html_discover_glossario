<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossário</title>
</head>
<body>
    <h1>Minha</h1>
    <h3>!DOCTYPE html</h3>
    <p>Define o tipo de documento como HTML5</p>
    <p><strong>html</strong><br>Define um documento HTML</p>
    <p><strong>head</strong><br>Container para metadados, título da página, links...</p>
    <p><strong>body</strong><br>Corpo do documento.</p>
</body>
</html>
